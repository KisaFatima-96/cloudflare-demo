<!DOCTYPE html>
<html>
<head>
  <title>Cloudflare Demo</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background: #f5f5f5;
    }

    input, button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      color: #333;
    }
  </style>
</head>

<body>

  <h1>Cloudflare Pages + Workers Demo 🚀</h1>

  <input type="text" id="name" placeholder="Enter your name" />
  <br>

  <button onclick="getData()">Send Request</button>

  <div id="result"></div>

  <script>
    async function getData() {
      const name = document.getElementById("name").value || "Guest";

      try {
        const res = await fetch("YOUR_WORKER_URL?name=" + name);
        const data = await res.json();

        document.getElementById("result").innerText = data.message;

      } catch (error) {
        document.getElementById("result").innerText = "Error connecting to Worker!";
      }
    }
  </script>

</body>
</html>
